name: Release

on:
  push:
    tags: ["v*"]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Same one-runner-per-architecture reasoning as ci.yml: @libsql's
          # native addon is a platform-specific optionalDependency, so
          # cross-compiling from a single host can't stage it.
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: darwin-x64
            os: macos-15-intel
          - target: darwin-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:binary -- ${{ matrix.target }}
      - run: tar -czf echo-${{ matrix.target }}.tar.gz -C dist-binaries/${{ matrix.target }} .
      - uses: softprops/action-gh-release@v2
        with:
          files: echo-${{ matrix.target }}.tar.gz
