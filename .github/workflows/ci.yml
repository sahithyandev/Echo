name: CI & Release

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update && sudo apt-get install -y libchromaprint-dev libchromaprint-tools ffmpeg
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test

  build-binary:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # @libsql/client's native addon is a platform-specific
          # optionalDependency — `bun install` only fetches the one
          # matching the current host, so each target builds on a
          # same-architecture runner rather than cross-compiling the
          # native addon too.
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: darwin-x64
            os: macos-15-intel
          - target: darwin-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:binary -- ${{ matrix.target }}

  tag:
    needs: [test, build-binary]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: |
          v="v$(cat VERSION.txt)"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "$v" >/dev/null 2>&1; then
            echo "$v already exists, skipping release"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "$v"
          git push origin "$v"
          echo "created=true" >> "$GITHUB_OUTPUT"

  docker:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-binaries:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Same one-runner-per-architecture reasoning as build-binary above.
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: darwin-x64
            os: macos-15-intel
          - target: darwin-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:binary -- ${{ matrix.target }}
      - run: tar -czf echo-${{ matrix.target }}.tar.gz -C dist-binaries/${{ matrix.target }} .
      # Extract this version's section from CHANGELOG.md (between its heading
      # and the next `## `). Falls back to auto-generated notes if empty.
      - id: notes
        run: |
          awk -v v="## ${{ needs.tag.outputs.version }}" '
            $0==v {f=1; next} f && /^## / {exit} f {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] && echo "have=true" >> "$GITHUB_OUTPUT" || echo "have=false" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: echo-${{ matrix.target }}.tar.gz
          body_path: ${{ steps.notes.outputs.have == 'true' && 'notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.have != 'true' }}
